<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Banquetes Almar</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <section class="section admin-panel">
    <div class="container">
      <div class="section-heading">
        <p class="section-label">Panel Admin</p>
        <h2>Dashboard Banquetes Almar</h2>
        <p id="adminWelcome"></p>
      </div>

      <div class="admin-menu">
        <a href="./dashboard.html" class="btn btn-secondary">Cotizaciones</a>
        <a href="./galeria.html" class="btn btn-secondary">Galería</a>
        <a href="./servicios.html" class="btn btn-secondary">Servicios</a>
        <a href="./eventos.html" class="btn btn-secondary">Eventos</a>
        <a href="./calendario.html" class="btn btn-secondary">Calendario</a>
        <a href="./inventario.html" class="btn btn-secondary">Inventario</a>
        <a href="./clientes.html" class="btn btn-secondary">Clientes</a>
        <a href="./pagos.html" class="btn btn-secondary">Pagos</a>
        <button id="logoutBtn" class="btn btn-secondary" type="button">Cerrar sesión</button>
      </div>

      <div class="admin-summary">
        <div class="summary-card">
          <span class="summary-title">Total de solicitudes</span>
          <strong id="totalQuotes">0</strong>
        </div>

        <div class="summary-card">
          <span class="summary-title">Total de eventos</span>
          <strong id="totalEventos">0</strong>
        </div>

        <div class="summary-card">
          <span class="summary-title">Confirmados</span>
          <strong id="confirmados">0</strong>
        </div>

        <div class="summary-card">
          <span class="summary-title">Ingresos</span>
          <strong id="ingresos">$0</strong>
        </div>

        <div class="summary-card">
          <span class="summary-title">Pendiente</span>
          <strong id="pendiente">$0</strong>
        </div>
      </div>

      <div id="quotesContainer" class="quotes-grid" style="margin-top: 2rem;"></div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
