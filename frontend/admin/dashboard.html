<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Banquetes Almar</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <section class="section admin-panel">
    <div class="container">
      <div class="section-heading">
        <p class="section-label">Panel Admin</p>
        <h2>Cotizaciones recibidas</h2>
        <p id="adminWelcome"></p>
      </div>

      <div class="admin-topbar">
        <div class="admin-summary">
          <div class="summary-card">
            <span class="summary-title">Total de solicitudes</span>
            <strong id="totalQuotes">0</strong>
          </div>
        </div>

        <button id="logoutBtn" class="btn btn-secondary">
          Cerrar sesión
        </button>
      </div>

      <div id="quotesContainer" class="quotes-grid"></div>
    </div>
  </section>

  <script src="../js/dashboard.js"></script>
</body>
</html>
