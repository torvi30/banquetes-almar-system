<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendario | Banquetes Almar</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <section class="section admin-panel">
    <div class="container">
      <div class="section-heading">
        <p class="section-label">Panel Admin</p>
        <h2>Calendario general</h2>
        <p>Visualiza reservas y eventos en un solo lugar.</p>
      </div>

      <div class="admin-menu admin-menu-grid">
        <a href="./dashboard.html" class="btn btn-secondary menu-btn">Dashboard</a>
        <a href="./cotizaciones.html" class="btn btn-secondary menu-btn">Cotizaciones</a>
        <a href="./galeria.html" class="btn btn-secondary menu-btn">Galería</a>
        <a href="./servicios.html" class="btn btn-secondary menu-btn">Servicios</a>
        <a href="./reservas.html" class="btn btn-secondary menu-btn">Reservas</a>
        <a href="./eventos.html" class="btn btn-secondary menu-btn">Eventos</a>
        <a href="./calendario.html" class="btn btn-secondary menu-btn active-menu">Calendario</a>
        <a href="./inventario.html" class="btn btn-secondary menu-btn">Inventario</a>
        <a href="./clientes.html" class="btn btn-secondary menu-btn">Clientes</a>
        <a href="./pagos.html" class="btn btn-secondary menu-btn">Pagos</a>
        <button id="logoutBtn" class="btn btn-secondary menu-btn" type="button">Cerrar sesión</button>
      </div>

      <div class="calendar-legend">
        <span class="legend-item"><span class="legend-dot legend-reserva"></span> Reserva</span>
        <span class="legend-item"><span class="legend-dot legend-evento"></span> Evento</span>
        <span class="legend-item"><span class="legend-dot legend-pendiente"></span> Pendiente</span>
        <span class="legend-item"><span class="legend-dot legend-confirmada"></span> Confirmado / Confirmada</span>
        <span class="legend-item"><span class="legend-dot legend-cancelada"></span> Cancelado / Cancelada</span>
        <span class="legend-item"><span class="legend-dot legend-convertida"></span> Convertido / En proceso</span>
      </div>

      <div class="calendar-toolbar">
        <button id="prevMonth" class="btn btn-secondary" type="button">◀</button>
        <h3 id="monthTitle" class="calendar-month-title"></h3>
        <button id="nextMonth" class="btn btn-secondary" type="button">▶</button>
      </div>

      <div class="calendar-weekdays">
        <div>Dom</div>
        <div>Lun</div>
        <div>Mar</div>
        <div>Mié</div>
        <div>Jue</div>
        <div>Vie</div>
        <div>Sáb</div>
      </div>

      <div id="calendarGrid" class="calendar-grid-pro"></div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/calendario-admin.js"></script>
</body>
</html>
