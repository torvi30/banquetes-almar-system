<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eventos | Banquetes Almar</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <section class="section admin-panel">
    <div class="container">
      <div class="section-heading">
        <p class="section-label">Panel Admin</p>
        <h2>Administrar eventos</h2>
        <p>Registra y controla los eventos del negocio.</p>
      </div>

      <div class="admin-menu">
        <a href="./dashboard.html" class="btn btn-secondary">Cotizaciones</a>
        <a href="./galeria.html" class="btn btn-secondary">Galería</a>
        <a href="./servicios.html" class="btn btn-secondary">Servicios</a>
        <a href="./eventos.html" class="btn btn-secondary">Eventos</a>
        <button id="logoutBtn" class="btn btn-secondary" type="button">Cerrar sesión</button>
      </div>

      <form id="eventForm" class="quote-form" enctype="multipart/form-data">
        <input type="hidden" id="eventId" />

        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" required />
        </div>

        <div class="form-group">
          <label for="fecha">Fecha</label>
          <input type="date" id="fecha" required />
        </div>

        <div class="form-group">
          <label for="tipo">Tipo de evento</label>
          <input type="text" id="tipo" required />
        </div>

        <div class="form-group">
          <label for="personas">Personas</label>
          <input type="number" id="personas" min="1" required />
        </div>

        <div class="form-group">
          <label for="estado">Estado</label>
          <select id="estado">
            <option value="Pendiente">Pendiente</option>
            <option value="Confirmado">Confirmado</option>
            <option value="Cancelado">Cancelado</option>
          </select>
        </div>

        <div class="form-group">
          <label for="imagen">Imagen de referencia</label>
          <input type="file" id="imagen" accept="image/*" />
        </div>

        <div class="form-group full-width">
          <label for="descripcion">Descripción / Detalles del evento</label>
          <textarea
            id="descripcion"
            rows="5"
            placeholder="Ej: decoración blanca y dorada, mesa principal con flores, buffet para 80 personas, DJ, globos, referencias del cliente..."
          ></textarea>
        </div>

        <div class="form-group full-width event-form-actions">
          <button type="submit" class="btn btn-primary" id="saveEventBtn">Crear evento</button>
          <button type="button" class="btn btn-secondary" id="cancelEditBtn">Cancelar edición</button>
        </div>
      </form>

      <div id="eventsGrid" class="quotes-grid" style="margin-top: 2rem;"></div>
    </div>
  </section>

  <script src="../js/eventos-admin.js"></script>
</body>
</html>
