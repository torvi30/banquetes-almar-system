<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eventos | Banquetes Almar</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <section class="section admin-panel">
    <div class="container">
      <div class="section-heading">
        <p class="section-label">Panel Admin</p>
        <h2>Administrar eventos</h2>
        <p>Crea, edita y elimina eventos de Banquetes Almar.</p>
      </div>

      <div class="admin-menu admin-menu-grid">
        <a href="./dashboard.html" class="btn btn-secondary menu-btn">Dashboard</a>
        <a href="./cotizaciones.html" class="btn btn-secondary menu-btn">Cotizaciones</a>
        <a href="./galeria.html" class="btn btn-secondary menu-btn">Galería</a>
        <a href="./servicios.html" class="btn btn-secondary menu-btn">Servicios</a>
        <a href="./reservas.html" class="btn btn-secondary menu-btn">Reservas</a>
        <a href="./eventos.html" class="btn btn-secondary menu-btn">Eventos</a>
        <a href="./calendario.html" class="btn btn-secondary menu-btn">Calendario</a>
        <a href="./inventario.html" class="btn btn-secondary menu-btn">Inventario</a>
        <a href="./clientes.html" class="btn btn-secondary menu-btn">Clientes</a>
        <a href="./pagos.html" class="btn btn-secondary menu-btn">Pagos</a>
        <button id="logoutBtn" class="btn btn-secondary menu-btn" type="button">Cerrar sesión</button>
      </div>

      <form id="eventForm" class="quote-form" enctype="multipart/form-data">
        <input type="hidden" id="eventId" />

        <div class="form-group">
          <label for="cliente_id">Cliente</label>
          <select id="cliente_id">
            <option value="">Selecciona un cliente</option>
          </select>
        </div>

        <div class="form-group">
          <label for="cliente">Nombre cliente</label>
          <input type="text" id="cliente" placeholder="Nombre del cliente" />
        </div>

        <div class="form-group">
          <label for="telefono">Teléfono</label>
          <input type="text" id="telefono" placeholder="Teléfono" />
        </div>

        <div class="form-group">
          <label for="tipo_evento">Tipo de evento</label>
          <input type="text" id="tipo_evento" placeholder="Ej: Cumpleaños" required />
        </div>

        <div class="form-group">
          <label for="fecha_evento">Fecha del evento</label>
          <input type="date" id="fecha_evento" required />
        </div>

        <div class="form-group">
          <label for="lugar">Lugar</label>
          <input type="text" id="lugar" placeholder="Lugar del evento" />
        </div>

        <div class="form-group">
          <label for="personas">Personas</label>
          <input type="number" id="personas" min="0" placeholder="Cantidad de personas" />
        </div>

        <div class="form-group">
          <label for="valor_total">Valor total</label>
          <input type="number" id="valor_total" min="0" placeholder="Ej: 500000" />
        </div>

        <div class="form-group">
          <label for="abono">Abono</label>
          <input type="number" id="abono" min="0" placeholder="Ej: 100000" />
        </div>

        <div class="form-group">
          <label for="imagen">Imagen</label>
          <input type="file" id="imagen" accept="image/*" />
        </div>

        <div class="form-group full-width">
          <label for="observaciones">Observaciones</label>
          <textarea id="observaciones" rows="4" placeholder="Observaciones del evento..."></textarea>
        </div>

        <div class="form-group full-width event-form-actions">
          <button id="saveEventBtn" class="btn btn-primary" type="submit">Guardar evento</button>
          <button id="cancelEditBtn" class="btn btn-secondary" type="button">Cancelar edición</button>
        </div>
      </form>

      <div id="eventsGrid" class="quotes-grid" style="margin-top: 2rem;"></div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/eventos-admin.js"></script>
</body>
</html>
