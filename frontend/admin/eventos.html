<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eventos | Banquetes Almar</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <section class="section admin-panel">
    <div class="container">
      <div class="section-heading">
        <p class="section-label">Panel Admin</p>
        <h2>Administrar eventos</h2>
        <p>Registra, organiza y controla pagos del evento.</p>
      </div>

      <div class="admin-menu">
        <a href="./dashboard.html" class="btn btn-secondary">Cotizaciones</a>
        <a href="./galeria.html" class="btn btn-secondary">Galería</a>
        <a href="./servicios.html" class="btn btn-secondary">Servicios</a>
        <a href="./eventos.html" class="btn btn-secondary">Eventos</a>
        <a href="./calendario.html" class="btn btn-secondary">Calendario</a>
        <button id="logoutBtn" class="btn btn-secondary" type="button">Cerrar sesión</button>
      </div>

      <form id="eventForm" class="quote-form" enctype="multipart/form-data">
        <input type="hidden" id="eventId" />

        <div class="form-group">
          <label for="cliente">Cliente</label>
          <input type="text" id="cliente" required />
        </div>

        <div class="form-group">
          <label for="telefono">Teléfono</label>
          <input type="text" id="telefono" />
        </div>

        <div class="form-group">
          <label for="tipo_evento">Tipo de evento</label>
          <input type="text" id="tipo_evento" required />
        </div>

        <div class="form-group">
          <label for="fecha_evento">Fecha del evento</label>
          <input type="date" id="fecha_evento" required />
        </div>

        <div class="form-group">
          <label for="lugar">Lugar</label>
          <input type="text" id="lugar" />
        </div>

        <div class="form-group">
          <label for="personas">Personas</label>
          <input type="number" id="personas" min="1" required />
        </div>

        <div class="form-group">
          <label for="valor_total">Valor total</label>
          <input type="number" id="valor_total" min="0" step="0.01" required />
        </div>

        <div class="form-group">
          <label for="abono">Abono</label>
          <input type="number" id="abono" min="0" step="0.01" required />
        </div>

        <div class="form-group">
          <label for="imagen">Imagen de referencia</label>
          <input type="file" id="imagen" accept="image/*" />
        </div>

        <div class="form-group full-width">
          <label for="observaciones">Observaciones / detalles</label>
          <textarea
            id="observaciones"
            rows="5"
            placeholder="Decoración, menú, colores, referencias, música, montaje, peticiones del cliente..."
          ></textarea>
        </div>

        <div class="form-group full-width event-form-actions">
          <button type="submit" class="btn btn-primary" id="saveEventBtn">Crear evento</button>
          <button type="button" class="btn btn-secondary" id="cancelEditBtn">Cancelar edición</button>
        </div>
      </form>

      <div id="eventsGrid" class="quotes-grid" style="margin-top: 2rem;"></div>
    </div>
  </section>

  <script src="../js/eventos-admin.js"></script>
</body>
</html>
