<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clientes | Banquetes Almar</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <section class="section admin-panel">
    <div class="container">
      <div class="section-heading">
        <p class="section-label">Panel Admin</p>
        <h2>Clientes</h2>
        <p>Administra y busca clientes por id, nombre o teléfono.</p>
      </div>

      <div class="admin-menu">
        <a href="./dashboard.html" class="btn btn-secondary">Cotizaciones</a>
        <a href="./galeria.html" class="btn btn-secondary">Galería</a>
        <a href="./servicios.html" class="btn btn-secondary">Servicios</a>
        <a href="./eventos.html" class="btn btn-secondary">Eventos</a>
        <a href="./calendario.html" class="btn btn-secondary">Calendario</a>
        <a href="./inventario.html" class="btn btn-secondary">Inventario</a>
        <a href="./clientes.html" class="btn btn-secondary">Clientes</a>
        <a href="./pagos.html" class="btn btn-secondary">Pagos</a>
        <button id="logoutBtn" class="btn btn-secondary" type="button">Cerrar sesión</button>
      </div>

      <div style="display:flex; justify-content:center; margin: 1.5rem 0 2rem 0;">
        <button id="btnBuscarCliente" class="btn btn-primary" type="button">
          🔎 Buscar cliente
        </button>
      </div>

      <form id="clientForm" class="quote-form">
        <input type="hidden" id="clientId" />

        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" required />
        </div>

        <div class="form-group">
          <label for="telefono">Teléfono / celular</label>
          <input type="text" id="telefono" />
        </div>

        <div class="form-group">
          <label for="email">Correo</label>
          <input type="email" id="email" />
        </div>

        <div class="form-group">
          <label for="documento">Documento</label>
          <input type="text" id="documento" />
        </div>

        <div class="form-group">
          <label for="direccion">Dirección</label>
          <input type="text" id="direccion" />
        </div>

        <div class="form-group">
          <label for="tipo_cliente">Tipo</label>
          <input type="text" id="tipo_cliente" value="Cliente" />
        </div>

        <div class="form-group full-width event-form-actions">
          <button type="submit" class="btn btn-primary" id="saveClientBtn">Guardar cliente</button>
          <button type="button" class="btn btn-secondary" id="cancelEditBtn">Cancelar edición</button>
        </div>
      </form>

      <div class="section-heading" style="margin-top: 2.5rem;">
        <h2>Listado de clientes</h2>
        <p>Aquí puedes ver todos los clientes registrados.</p>
      </div>

      <div id="clientsGrid" class="quotes-grid" style="margin-top: 1.5rem;"></div>
    </div>
  </section>

  <script src="../js/clientes-admin.js"></script>
</body>
</html>
