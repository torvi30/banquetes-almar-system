<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clientes Admin | Banquetes Almar</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <section class="section admin-panel">
    <div class="container">
      <div class="section-heading">
        <p class="section-label">Panel Admin</p>
        <h2>Administrar clientes</h2>
        <p>Registra y organiza la información de tus clientes.</p>
      </div>

      <div class="admin-menu">
        <a href="./dashboard.html" class="btn btn-secondary">Cotizaciones</a>
        <a href="./galeria.html" class="btn btn-secondary">Galería</a>
        <a href="./servicios.html" class="btn btn-secondary">Servicios</a>
        <a href="./eventos.html" class="btn btn-secondary">Eventos</a>
        <a href="./calendario.html" class="btn btn-secondary">Calendario</a>
        <a href="./inventario.html" class="btn btn-secondary">Inventario</a>
        <a href="./clientes.html" class="btn btn-secondary">Clientes</a>
        <a href="./pagos.html?evento_id=${evento.id}" class="btn btn-secondary">Pagos</a>
        <button id="logoutBtn" class="btn btn-secondary" type="button">Cerrar sesión</button>
      </div>

      <form id="clientForm" class="quote-form">
        <input type="hidden" id="clientId" />

        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" required />
        </div>

        <div class="form-group">
          <label for="telefono">Teléfono</label>
          <input type="text" id="telefono" required />
        </div>

        <div class="form-group">
          <label for="email">Correo</label>
          <input type="email" id="email" />
        </div>

        <div class="form-group">
          <label for="documento">Documento</label>
          <input type="text" id="documento" />
        </div>

        <div class="form-group">
          <label for="direccion">Dirección</label>
          <input type="text" id="direccion" />
        </div>

        <div class="form-group">
          <label for="tipo_cliente">Tipo de cliente</label>
          <select id="tipo_cliente">
            <option value="Persona">Persona</option>
            <option value="Empresa">Empresa</option>
          </select>
        </div>

        <div class="form-group full-width">
          <label for="observaciones">Observaciones</label>
          <textarea id="observaciones" rows="4" placeholder="Notas del cliente..."></textarea>
        </div>

        <div class="form-group full-width event-form-actions">
          <button type="submit" class="btn btn-primary" id="saveClientBtn">Guardar cliente</button>
          <button type="button" class="btn btn-secondary" id="cancelEditBtn">Cancelar edición</button>
        </div>
      </form>

      <div id="clientsGrid" class="quotes-grid" style="margin-top: 2rem;"></div>
    </div>
  </section>

  <script src="../js/clientes-admin.js"></script>
</body>
</html>
