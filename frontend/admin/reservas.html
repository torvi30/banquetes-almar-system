<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reservas | Banquetes Almar</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <section class="section admin-panel">
    <div class="container">
      <div class="section-heading">
        <p class="section-label">Panel Admin</p>
        <h2>Reservas / Disponibilidad</h2>
        <p>Gestiona reservas pendientes antes de convertirlas en eventos.</p>
      </div>

      <div class="admin-menu admin-menu-grid">
        <a href="./dashboard.html" class="btn btn-secondary menu-btn">Dashboard</a>
        <a href="./cotizaciones.html" class="btn btn-secondary menu-btn">Cotizaciones</a>
        <a href="./galeria.html" class="btn btn-secondary menu-btn">Galería</a>
        <a href="./servicios.html" class="btn btn-secondary menu-btn">Servicios</a>
        <a href="./reservas.html" class="btn btn-secondary menu-btn">Reservas</a>
        <a href="./eventos.html" class="btn btn-secondary menu-btn">Eventos</a>
        <a href="./calendario.html" class="btn btn-secondary menu-btn">Calendario</a>
        <a href="./inventario.html" class="btn btn-secondary menu-btn">Inventario</a>
        <a href="./clientes.html" class="btn btn-secondary menu-btn">Clientes</a>
        <a href="./pagos.html" class="btn btn-secondary menu-btn">Pagos</a>
        <button id="logoutBtn" class="btn btn-secondary menu-btn" type="button">Cerrar sesión</button>
      </div>

      <form id="reservationForm" class="quote-form">
        <input type="hidden" id="reservationId" />

        <div class="form-group">
          <label for="cliente_id">ID cliente</label>
          <input type="number" id="cliente_id" />
        </div>

        <div class="form-group">
          <label for="cliente">Cliente</label>
          <input type="text" id="cliente" required />
        </div>

        <div class="form-group">
          <label for="telefono">Teléfono</label>
          <input type="text" id="telefono" />
        </div>

        <div class="form-group">
          <label for="tipo_evento">Tipo de evento</label>
          <input type="text" id="tipo_evento" required />
        </div>

        <div class="form-group">
          <label for="fecha_evento">Fecha del evento</label>
          <input type="date" id="fecha_evento" required />
        </div>

        <div class="form-group">
          <label for="lugar">Lugar</label>
          <input type="text" id="lugar" />
        </div>

        <div class="form-group">
          <label for="personas">Personas</label>
          <input type="number" id="personas" min="0" />
        </div>

        <div class="form-group">
          <label for="estado">Estado</label>
          <select id="estado">
            <option value="Pendiente">Pendiente</option>
            <option value="Confirmada">Confirmada</option>
            <option value="Cancelada">Cancelada</option>
            <option value="Convertida">Convertida</option>
          </select>
        </div>

        <div class="form-group full-width">
          <label for="observaciones">Observaciones</label>
          <textarea id="observaciones" rows="3"></textarea>
        </div>

        <div class="form-group full-width event-form-actions">
          <button type="submit" class="btn btn-primary" id="saveReservationBtn">Guardar reserva</button>
          <button type="button" class="btn btn-secondary" id="cancelEditBtn">Cancelar edición</button>
        </div>
      </form>

      <div class="quote-form" style="margin-top: 2rem;">
        <div class="form-group">
          <label for="filterFecha">Filtrar por fecha</label>
          <input type="date" id="filterFecha" />
        </div>

        <div class="form-group">
          <label for="filterEstado">Filtrar por estado</label>
          <select id="filterEstado">
            <option value="">Todos</option>
            <option value="Pendiente">Pendiente</option>
            <option value="Confirmada">Confirmada</option>
            <option value="Cancelada">Cancelada</option>
            <option value="Convertida">Convertida</option>
          </select>
        </div>

        <div class="form-group">
          <label for="filterSearch">Buscar</label>
          <input type="text" id="filterSearch" placeholder="Cliente, teléfono, tipo de evento..." />
        </div>

        <div class="form-group">
          <label>&nbsp;</label>
          <button type="button" class="btn btn-secondary" id="btnFiltrar">Filtrar</button>
        </div>
      </div>

      <div id="reservationsGrid" class="quotes-grid" style="margin-top: 2rem;"></div>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/reservas-admin.js"></script>
</body>
</html>
